name: hackathon

services:
  postgres:
    image: postgres:16-alpine
    container_name: seal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seal_hackathon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-seal_hackathon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: seal_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVER_PORT: 8085
      # Trong Docker luon dung hostname "postgres", khong dung DB_URL tu .env (localhost:5433).
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-seal_hackathon}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-REPLACE_WITH_REAL_GOOGLE_CLIENT_ID.apps.googleusercontent.com}
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret_change_me_please_32_chars_minimum}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-fpt.edu.vn,fe.edu.vn,gmail.com,seal.edu.vn}
      APP_BOOTSTRAP_ORGANIZER_EMAIL: ${APP_BOOTSTRAP_ORGANIZER_EMAIL:-}
      DEV_BOOTSTRAP_ORGANIZER_EMAIL: ${DEV_BOOTSTRAP_ORGANIZER_EMAIL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-false}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      INVITATION_BASE_URL: ${INVITATION_BASE_URL:-http://localhost:5173}
      MAIL_API_BASE_URL: ${MAIL_API_BASE_URL:-http://localhost:8085}
      INVITATION_REMINDER_ENABLED: ${INVITATION_REMINDER_ENABLED:-true}
      INVITATION_REMINDER_HOURS: ${INVITATION_REMINDER_HOURS:-24}
      INVITATION_REMINDER_POLL_MS: ${INVITATION_REMINDER_POLL_MS:-3600000}
      APP_INVITATION_TOKEN_SECRET: ${APP_INVITATION_TOKEN_SECRET:-dev-invite-secret-change-me}
      GITHUB_SCHEDULER_ENABLED: ${GITHUB_SCHEDULER_ENABLED:-false}
      GITHUB_SCHEDULER_POLL_MS: ${GITHUB_SCHEDULER_POLL_MS:-180000}
      GITHUB_MODE: ${GITHUB_MODE:-pat}
      GITHUB_ORG: ${GITHUB_ORG:-}
      GITHUB_PAT: ${GITHUB_PAT:-}
      GITHUB_DEFAULT_BRANCH: ${GITHUB_DEFAULT_BRANCH:-main}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_API_VERSION: ${GITHUB_API_VERSION:-2026-03-10}
      GITHUB_TEMPLATE_OWNER: ${GITHUB_TEMPLATE_OWNER:-}
      GITHUB_TEMPLATE_REPO: ${GITHUB_TEMPLATE_REPO:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_WEBHOOK_URL: ${GITHUB_WEBHOOK_URL:-}
      GITHUB_WEBHOOK_AUTO_REGISTER: ${GITHUB_WEBHOOK_AUTO_REGISTER:-true}
      AI_REVIEW_SCHEDULER_ENABLED: ${AI_REVIEW_SCHEDULER_ENABLED:-false}
      AI_REVIEW_INTERVAL_MINUTES: ${AI_REVIEW_INTERVAL_MINUTES:-60}
      AI_REVIEW_POLL_MS: ${AI_REVIEW_POLL_MS:-3600000}
      AI_REVIEW_BATCH_WINDOW_HOURS: ${AI_REVIEW_BATCH_WINDOW_HOURS:-1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_REVIEW_MODEL: ${AI_REVIEW_MODEL:-gemini-2.0-flash}
      AI_REVIEW_GITHUB_ISSUES_ENABLED: ${AI_REVIEW_GITHUB_ISSUES_ENABLED:-true}
      AI_REVIEW_WEBHOOK_ENABLED: ${AI_REVIEW_WEBHOOK_ENABLED:-true}
      AI_REVIEW_WEBHOOK_DEBOUNCE_MS: ${AI_REVIEW_WEBHOOK_DEBOUNCE_MS:-60000}
      AI_REVIEW_NOTIFICATIONS_ENABLED: ${AI_REVIEW_NOTIFICATIONS_ENABLED:-true}
      AI_REVIEW_MANUAL_COOLDOWN_SECONDS: ${AI_REVIEW_MANUAL_COOLDOWN_SECONDS:-30}
      AI_REVIEW_MAX_COMMITS_PER_RUN: ${AI_REVIEW_MAX_COMMITS_PER_RUN:-100}
      AI_REVIEW_JUDGE_ACCESS_ENABLED: ${AI_REVIEW_JUDGE_ACCESS_ENABLED:-true}
      AI_REVIEW_RETRY_FAILED_ENABLED: ${AI_REVIEW_RETRY_FAILED_ENABLED:-false}
      N8N_AI_REVIEW_WEBHOOK_SECRET: ${N8N_AI_REVIEW_WEBHOOK_SECRET:-}
      FILE_STORAGE_PATH: /app/storage
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - ./storage:/app/storage

  n8n:
    profiles: ["n8n"]
    image: docker.n8n.io/n8nio/n8n:1.76.1
    container_name: seal_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Legacy workflows use $env.N8N_*_WORKFLOW_ID in Execute Workflow nodes
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
      TZ: Asia/Ho_Chi_Minh
      # n8n container must reach host BE — do not use localhost here
      BACKEND_URL: ${N8N_BACKEND_URL:-http://host.docker.internal:8085}
      N8N_AI_REVIEW_WEBHOOK_SECRET: ${N8N_AI_REVIEW_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${AI_API_KEY:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_REVIEW_MODEL: ${AI_REVIEW_MODEL:-gemini-2.5-flash}
      SUPABASE_URL: ${N8N_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${N8N_SUPABASE_SERVICE_ROLE_KEY:-}
      N8N_SUPABASE_URL: ${N8N_SUPABASE_URL:-}
      N8N_SUPABASE_SERVICE_ROLE_KEY: ${N8N_SUPABASE_SERVICE_ROLE_KEY:-}
      N8N_FIREBASE_DATABASE_URL: ${N8N_FIREBASE_DATABASE_URL:-}
      N8N_FIREBASE_ACCESS_TOKEN: ${N8N_FIREBASE_ACCESS_TOKEN:-}
      N8N_REPO_LIST: ${N8N_REPO_LIST:-}
      N8N_PROCESS_SINGLE_REPO_WORKFLOW_ID: ${N8N_PROCESS_SINGLE_REPO_WORKFLOW_ID:-}
      N8N_LLM_HACKATHON_WORKFLOW_ID: ${N8N_LLM_HACKATHON_WORKFLOW_ID:-}
      GITHUB_PAT: ${GITHUB_PAT:-}
      GITHUB_TOKEN: ${GITHUB_PAT:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./ai-review/n8n/workflows:/import/workflows:ro

  frontend:
    profiles: ["frontend"]
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: seal_frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8085/api
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  n8n_data:
