server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: seal-hackathon-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/seal_hackathon}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change_me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  ai-review-interval-minutes: ${AI_REVIEW_INTERVAL_MINUTES:30}
  file-storage-path: ${FILE_STORAGE_PATH:./storage}
