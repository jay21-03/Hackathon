# Kiểm tra FE khi push/PR — chỉ lint + build (không E2E).
# E2E chạy local: cd FE && npm run test:e2e
name: FE CI

on:
  push:
    paths:
      - "FE/**"
      - ".github/workflows/fe-ci.yml"
  pull_request:
    paths:
      - "FE/**"
      - ".github/workflows/fe-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - run: npm ci

      - name: Lint & typecheck
        run: npm run lint

      - name: Production build
        run: npm run build
