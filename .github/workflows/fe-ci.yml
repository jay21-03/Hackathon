name: FE CI

on:
  push:
    paths:
      - "FE/**"
      - ".github/workflows/fe-ci.yml"
  pull_request:
    paths:
      - "FE/**"
      - ".github/workflows/fe-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build
