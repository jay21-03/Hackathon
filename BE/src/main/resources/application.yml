server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: seal-hackathon-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/seal_hackathon}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change_me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  auth:
    # Public OAuth client id (also in FE VITE_GOOGLE_CLIENT_ID). Override via GOOGLE_CLIENT_ID in prod.
    google-client-id: ${GOOGLE_CLIENT_ID:375393891941-invk4kstp7pq1r1n2c9qspupn6hen025.apps.googleusercontent.com}
    allowed-email-domains: ${ALLOWED_EMAIL_DOMAINS:}
    bootstrap-organizer-email: ${APP_BOOTSTRAP_ORGANIZER_EMAIL:${DEV_BOOTSTRAP_ORGANIZER_EMAIL:}}
    password-reset-expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:60}
    dev-auth-enabled: ${DEV_AUTH_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai-review-interval-minutes: ${AI_REVIEW_INTERVAL_MINUTES:30}
  github:
    mode: ${GITHUB_MODE:pat}
    org: ${GITHUB_ORG:}
    pat: ${GITHUB_PAT:}
    default-branch: ${GITHUB_DEFAULT_BRANCH:main}
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
    api-version: ${GITHUB_API_VERSION:2026-03-10}
    template-owner: ${GITHUB_TEMPLATE_OWNER:}
    template-repo: ${GITHUB_TEMPLATE_REPO:}
  file-storage-path: ${FILE_STORAGE_PATH:./storage}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@seal-hackathon.local}}
    invitation-base-url: ${INVITATION_BASE_URL:http://localhost:5173}
  invitation:
    token-secret: ${APP_INVITATION_TOKEN_SECRET:dev-invite-secret-change-me}
