server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: seal-hackathon-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/seal_hackathon}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change_me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  auth:
    # Public OAuth client id (also in FE VITE_GOOGLE_CLIENT_ID). Override via GOOGLE_CLIENT_ID in prod.
    google-client-id: ${GOOGLE_CLIENT_ID:375393891941-invk4kstp7pq1r1n2c9qspupn6hen025.apps.googleusercontent.com}
    allowed-email-domains: ${ALLOWED_EMAIL_DOMAINS:}
    bootstrap-organizer-email: ${APP_BOOTSTRAP_ORGANIZER_EMAIL:${DEV_BOOTSTRAP_ORGANIZER_EMAIL:}}
    password-reset-expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:60}
    dev-auth-enabled: ${DEV_AUTH_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  github:
    mode: ${GITHUB_MODE:pat}
    org: ${GITHUB_ORG:}
    pat: ${GITHUB_PAT:}
    app-id: ${GITHUB_APP_ID:0}
    app-installation-id: ${GITHUB_APP_INSTALLATION_ID:0}
    app-private-key: ${GITHUB_APP_PRIVATE_KEY:}
    app-private-key-path: ${GITHUB_APP_PRIVATE_KEY_PATH:}
    default-branch: ${GITHUB_DEFAULT_BRANCH:main}
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
    api-version: ${GITHUB_API_VERSION:2026-03-10}
    template-owner: ${GITHUB_TEMPLATE_OWNER:}
    template-repo: ${GITHUB_TEMPLATE_REPO:}
    scheduler-enabled: ${GITHUB_SCHEDULER_ENABLED:false}
    scheduler-initial-delay-ms: ${GITHUB_SCHEDULER_INITIAL_DELAY_MS:60000}
    scheduler-poll-ms: ${GITHUB_SCHEDULER_POLL_MS:180000}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
    # Public URL GitHub calls on push. Falls back to MAIL_API_BASE_URL + /api/v1/webhooks/github.
    webhook-url: ${GITHUB_WEBHOOK_URL:}
    webhook-auto-register: ${GITHUB_WEBHOOK_AUTO_REGISTER:true}
  file-storage-path: ${FILE_STORAGE_PATH:./storage}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@seal-hackathon.local}}
    invitation-base-url: ${INVITATION_BASE_URL:http://localhost:5173}
    api-base-url: ${MAIL_API_BASE_URL:http://localhost:8085}
  invitation:
    token-secret: ${APP_INVITATION_TOKEN_SECRET:dev-invite-secret-change-me}
    reminder-enabled: ${INVITATION_REMINDER_ENABLED:true}
    reminder-hours-before-expiry: ${INVITATION_REMINDER_HOURS:24}
    reminder-poll-ms: ${INVITATION_REMINDER_POLL_MS:3600000}
  ai:
    review:
      scheduler-enabled: ${AI_REVIEW_SCHEDULER_ENABLED:false}
      interval-minutes: ${AI_REVIEW_INTERVAL_MINUTES:5}
      initial-delay-ms: ${AI_REVIEW_INITIAL_DELAY_MS:120000}
      poll-ms: ${AI_REVIEW_POLL_MS:300000}
      api-key: ${AI_API_KEY:}
      model: ${AI_REVIEW_MODEL:gemini-2.0-flash}
      github-issues-enabled: ${AI_REVIEW_GITHUB_ISSUES_ENABLED:true}
      webhook-enabled: ${AI_REVIEW_WEBHOOK_ENABLED:true}
      webhook-debounce-ms: ${AI_REVIEW_WEBHOOK_DEBOUNCE_MS:60000}
      notifications-enabled: ${AI_REVIEW_NOTIFICATIONS_ENABLED:true}
      manual-cooldown-seconds: ${AI_REVIEW_MANUAL_COOLDOWN_SECONDS:30}
