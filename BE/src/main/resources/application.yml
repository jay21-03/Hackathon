server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: seal-hackathon-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/seal_hackathon}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change_me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  auth:
    google-client-id: ${GOOGLE_CLIENT_ID:}
    allowed-email-domains: ${ALLOWED_EMAIL_DOMAINS:}
    bootstrap-organizer-email: ${APP_BOOTSTRAP_ORGANIZER_EMAIL:${DEV_BOOTSTRAP_ORGANIZER_EMAIL:}}
    dev-auth-enabled: ${DEV_AUTH_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai-review-interval-minutes: ${AI_REVIEW_INTERVAL_MINUTES:30}
  file-storage-path: ${FILE_STORAGE_PATH:./storage}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@seal-hackathon.local}}
    invitation-base-url: ${INVITATION_BASE_URL:http://localhost:5173}
  invitation:
    token-secret: ${APP_INVITATION_TOKEN_SECRET:dev-invite-secret-change-me}
